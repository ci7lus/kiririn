<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>kiririn BML</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #video-plane {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #stage {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top left;
  }
</style>
</head>
<body>
  <div id="video-plane"></div>
  <div id="stage"></div>
  <script src="bml.js"></script>
</body>
</html>
