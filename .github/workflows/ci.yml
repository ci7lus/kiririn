name: CI

on:
    push:
        branches: [main]
        tags: ["*"]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.run_id) || format('{0}-{1}', github.workflow, github.ref) }}

env:
    PROJECT: kiririn.xcodeproj
    SCHEME: kiririn

jobs:
    lint:
        name: Lint & Format Check
        runs-on: macos-26
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Show Xcode version
              run: xcodebuild -version

            - name: swift-format lint
              run: |
                  xcrun swift-format lint --recursive --strict \
                    kiririn/ kiririnTests/ kiririnUITests/ Packages/

    build:
        name: Build ${{ matrix.platform.name }}
        needs: lint
        runs-on: macos-26
        timeout-minutes: 60
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - name: iOS
                      destination: "generic/platform=iOS"
                      id: ios
                    - name: macOS
                      destination: "generic/platform=macOS"
                      id: macos
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Cache SPM packages
              uses: actions/cache@v6
              with:
                  path: ${{ runner.temp }}/SourcePackages
                  key: spm-${{ hashFiles('kiririn.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: ./web/bml/

            - name: Cache VLCKit
              id: vlckit-cache
              uses: actions/cache@v6
              with:
                  path: |
                      ./Packages/VLCKit/VLCKit.xcframework
                      ./Packages/VLCKit/VLCKitAssets/LicenseNotices/
                      ./Packages/VLCKit/VLCKitAssets/dodeca_and_7channel_3DSL_HRTF.sofa
                      ./kiririn/rounded-mplus-1m-wadalab-comp-arib.ttf
                  key: vlckit-${{ hashFiles('setup.sh') }}

            - name: Setup dependencies
              env:
                  VLCKIT_CACHE_HIT: ${{ steps.vlckit-cache.outputs.cache-hit }}
              run: ./setup.sh

            - name: Build archive
              run: |
                  xcodebuild archive \
                    -project "$PROJECT" \
                    -scheme "$SCHEME" \
                    -destination "${{ matrix.platform.destination }}" \
                    -archivePath "$RUNNER_TEMP/${{ matrix.platform.id }}/kiririn-${{ matrix.platform.id }}.xcarchive" \
                    -derivedDataPath "$RUNNER_TEMP/DerivedData" \
                    -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
                    -skipPackagePluginValidation \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY=""

            - name: Create XCArchive ZIP
              run: |
                  ditto -c -k --sequesterRsrc --keepParent \
                    "$RUNNER_TEMP/${{ matrix.platform.id }}/kiririn-${{ matrix.platform.id }}.xcarchive" \
                    "$RUNNER_TEMP/kiririn-${{ matrix.platform.id }}.xcarchive.zip"

            - name: Upload XCArchive ZIP
              uses: actions/upload-artifact@v7
              with:
                  name: kiririn-${{ matrix.platform.id }}.xcarchive.zip
                  path: ${{ runner.temp }}/kiririn-${{ matrix.platform.id }}.xcarchive.zip
                  compression-level: 0
                  if-no-files-found: error
                  archive: false

            - name: Upload XCArchive ZIP to release
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
                  TAG_NAME: ${{ github.ref_name }}
                  ARCHIVE_ZIP: ${{ runner.temp }}/kiririn-${{ matrix.platform.id }}.xcarchive.zip
              run: |
                  if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
                    gh release create "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --notes "Release $TAG_NAME" \
                      || gh release view "$TAG_NAME" >/dev/null
                  fi

                  gh release upload "$TAG_NAME" "$ARCHIVE_ZIP" --clobber

    package-test:
        name: Test Packages
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        needs: lint
        runs-on: macos-26
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Run package tests
              run: |
                  swift test --package-path Packages/ARIBStandardKit
                  swift test --package-path Packages/ApkSignatureVerifierKit
                  swift test --package-path Packages/KppxKit

    test:
        name: Test ${{ matrix.platform.name }}
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        needs: lint
        runs-on: macos-26
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - name: iOS
                      destination: "platform=iOS Simulator"
                      id: ios
                      code_coverage: "NO"
                      only_testing: kiririnTests
                    - name: macOS
                      destination: "platform=macOS"
                      id: macos
                      code_coverage: "YES"
                      only_testing: ""
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Cache SPM packages
              uses: actions/cache@v6
              with:
                  path: ${{ runner.temp }}/SourcePackages
                  key: spm-${{ hashFiles('kiririn.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

            - name: Cache VLCKit
              id: vlckit-cache
              uses: actions/cache@v6
              with:
                  path: |
                      ./Packages/VLCKit/VLCKit.xcframework
                      ./Packages/VLCKit/VLCKitAssets/LicenseNotices/
                      ./Packages/VLCKit/VLCKitAssets/dodeca_and_7channel_3DSL_HRTF.sofa
                      ./kiririn/rounded-mplus-1m-wadalab-comp-arib.ttf
                  key: vlckit-${{ hashFiles('setup.sh') }}

            - name: Setup dependencies
              env:
                  VLCKIT_CACHE_HIT: ${{ steps.vlckit-cache.outputs.cache-hit }}
              run: ./setup.sh

            - name: Run tests
              env:
                  PLATFORM_ID: ${{ matrix.platform.id }}
                  TEST_DESTINATION: ${{ matrix.platform.destination }}
                  TEST_CODE_COVERAGE: ${{ matrix.platform.code_coverage }}
                  TEST_ONLY_TARGET: ${{ matrix.platform.only_testing }}
                  TEST_RESULT_DIR: ${{ runner.temp }}/TestResults
                  TEST_RESULT_BUNDLE_PATH: ${{ runner.temp }}/TestResults/kiririn-${{ matrix.platform.id }}-test.xcresult
              run: |
                  mkdir -p "$TEST_RESULT_DIR"

                  if [ "$PLATFORM_ID" = "ios" ]; then
                    SIMULATOR_UDID="$(
                      xcrun simctl list devices available --json | jq -er '
                        [
                          .devices
                          | to_entries
                          | map(select(.key | contains(".iOS-")))
                          | sort_by(.key | [scan("[0-9]+") | tonumber])
                          | reverse[]
                          | .value[]
                          | select(.isAvailable and (.name | startswith("iPhone")))
                          | .udid
                        ][0] // error("No available iOS Simulator found")
                      '
                    )"
                    TEST_DESTINATION="platform=iOS Simulator,id=$SIMULATOR_UDID"
                  fi

                  TEST_SELECTION_ARGS=()
                  if [ -n "$TEST_ONLY_TARGET" ]; then
                    TEST_SELECTION_ARGS+=("-only-testing:$TEST_ONLY_TARGET")
                  fi

                  xcodebuild test \
                    -project "$PROJECT" \
                    -scheme "$SCHEME" \
                    -destination "$TEST_DESTINATION" \
                    -destination-timeout 120 \
                    -enableCodeCoverage "$TEST_CODE_COVERAGE" \
                    -showBuildTimingSummary \
                    -derivedDataPath "$RUNNER_TEMP/DerivedData" \
                    -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
                    -skipPackagePluginValidation \
                    -resultBundlePath "$TEST_RESULT_BUNDLE_PATH" \
                    "${TEST_SELECTION_ARGS[@]}" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    COMPILER_INDEX_STORE_ENABLE=NO

            - name: Upload test result bundle
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: kiririn-${{ matrix.platform.id }}-test-results
                  path: ${{ runner.temp }}/TestResults/*.xcresult
                  compression-level: 0
                  if-no-files-found: warn

    complete:
        name: Complete
        needs: [lint, build, package-test, test]
        runs-on: ubuntu-latest
        steps:
            - run: echo "All jobs completed successfully."
