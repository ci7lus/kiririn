<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiririn Display Area Sample</title>
  <script id="kiririn-plugin-manifest" type="application/json">
    {
      "name": "Kiririn Display Area Sample",
      "identifier": "kiririn.display-area-sample",
      "version": "1.0.0",
      "author": "kiririn",
      "url": "https://example.com/kiririn/display-area-sample",
      "displayAreas": ["playerOverlay", "pluginSettings", "pluginScreen"],
      "contextId": "display-area-sample"
    }
  </script>
  <style>
    :root {
      --bg: rgba(7, 12, 23, 0.9);
      --surface: rgba(12, 18, 33, 0.82);
      --surface-strong: rgba(8, 14, 26, 0.94);
      --fg: #eef6ff;
      --sub: #b7c9da;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --border: rgba(148, 163, 184, 0.26);
      --ok: #34d399;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      color: var(--fg);
      background: transparent;
      overflow: hidden;
    }

    body[data-area-type="pluginScreen"] {
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 28%),
        linear-gradient(180deg, #07111d 0%, #0f172a 100%);
    }

    body[data-area-type="playerOverlay"] #app {
      pointer-events: none;
    }

    #app {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
    }

    .screen-scroll {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card,
    .section,
    .settings-panel {
      backdrop-filter: blur(14px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-top,
    .section-header,
    .toggle-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .kicker {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero-title {
      margin: 6px 0 0;
      font-size: 26px;
      line-height: 1.1;
      word-break: break-word;
    }

    .hero-subtitle,
    .section-note,
    .settings-copy,
    .toggle-note,
    .status-line,
    .empty-state {
      margin: 0;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(6, 10, 20, 0.34);
      font-size: 12px;
      color: var(--sub);
    }

    .chip.is-on {
      color: #d1fae5;
      border-color: rgba(52, 211, 153, 0.35);
      background: rgba(5, 46, 22, 0.34);
    }

    .chip.is-off {
      color: #fee2e2;
      border-color: rgba(248, 113, 113, 0.3);
      background: rgba(69, 10, 10, 0.34);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px 16px;
    }

    .summary-item {
      padding-top: 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
    }

    .summary-label {
      font-size: 12px;
      color: var(--sub);
    }

    .summary-value {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .section {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-title,
    .settings-title,
    .toggle-label {
      margin: 0;
      font-weight: 700;
    }

    .section-title {
      font-size: 16px;
    }

    .settings-title {
      font-size: 20px;
    }

    .json-block {
      margin: 0;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: var(--surface-strong);
      color: #dbeafe;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }

    .capture-preview-frame {
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(2, 6, 23, 0.86);
    }

    .capture-preview-image {
      display: block;
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      background: rgba(2, 6, 23, 0.92);
    }

    .carousel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .carousel-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .carousel-title,
    .carousel-subtitle,
    .carousel-indicator {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .carousel-title {
      font-weight: 700;
      color: var(--fg);
    }

    .carousel-subtitle,
    .carousel-indicator {
      color: var(--sub);
    }

    .carousel-controls,
    .carousel-dots {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .carousel-button,
    .carousel-dot {
      border: 1px solid var(--border);
      background: rgba(8, 14, 26, 0.42);
      color: var(--fg);
      cursor: pointer;
    }

    .carousel-button {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
    }

    .carousel-button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .carousel-dot {
      width: 10px;
      height: 10px;
      padding: 0;
      border-radius: 999px;
      opacity: 0.5;
    }

    .carousel-dot.is-active {
      background: var(--accent-strong);
      opacity: 1;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed rgba(148, 163, 184, 0.26);
      background: rgba(7, 12, 23, 0.52);
    }

    .overlay-shell {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .overlay-badge {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      max-width: min(260px, calc(100vw - 20px));
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(8, 15, 28, 0.76);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .overlay-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .overlay-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.16);
    }

    .overlay-label {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #dff6ff;
    }

    .overlay-meta {
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .settings-shell {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .settings-panel {
      box-sizing: border-box;
      width: min(420px, 100%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .toggle-card {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 26, 0.42);
      align-items: center;
    }

    .toggle-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .toggle-label {
      font-size: 14px;
    }

    .toggle-input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      accent-color: var(--accent-strong);
    }

    @media (max-width: 640px) {
      .screen-scroll {
        padding: 16px;
      }

      .hero-title {
        font-size: 22px;
      }

      .hero-card,
      .section,
      .settings-panel {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      const bridge = window.kiririn || {};
      const app = document.getElementById("app");
      const SETTINGS_KEY = "kiririn.display-area-sample.settings";
      const SETTINGS_CHANNEL_NAME = "kiririn.display-area-sample.settings";
      const DEFAULT_SETTINGS = Object.freeze({ showPlayerOverlay: true });

      let settings = loadSettings();
      let settingsChannel = null;
      let latestCapturePayload = null;
      let latestCapturePreviewItems = [];
      let latestCapturePreviewStatus = "キャプチャ待機中";
      let latestCapturePreviewIndex = 0;
      let latestCaptureRequestToken = 0;

      function formatTimestamp(seconds) {
        if (seconds == null) return "-";
        const d = new Date(seconds * 1000);
        return d.toLocaleString("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function formatDuration(seconds) {
        if (seconds == null) return "-";
        const total = Math.max(0, Math.floor(seconds));
        const h = Math.floor(total / 3600);
        const m = Math.floor(total / 60);
        const s = total % 60;
        if (h > 0) {
          return `${h}時間${m % 60}分${s}秒`;
        }
        return m > 0 ? `${m}分${s}秒` : `${s}秒`;
      }

      function toAreaLabel(type) {
        switch (type) {
          case "playerOverlay": return "playerOverlay";
          case "pluginSettings": return "pluginSettings";
          case "pluginScreen": return "pluginScreen";
          default: return String(type || "unknown");
        }
      }

      function formatPlaybackTime(seconds) {
        if (seconds == null) return "-";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) {
          return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }
        return `${m}:${String(s).padStart(2, "0")}`;
      }

      function formatPosition(value) {
        if (value == null) return "-";
        return `${Number(value).toFixed(4)} (${(Number(value) * 100).toFixed(2)}%)`;
      }

      function formatBoolean(value) {
        return value ? "true" : "false";
      }

      function formatDateLike(value) {
        if (!value) return "-";
        const date = value instanceof Date ? value : new Date(value);
        if (Number.isNaN(date.getTime())) {
          return String(value);
        }
        return date.toLocaleString("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function shortID(id) {
        if (!id) return "(none)";
        if (id.length <= 10) return id;
        return `${id.slice(0, 8)}…`;
      }

      function createElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        if (text != null) element.textContent = text;
        return element;
      }

      function appendSummaryItem(parent, label, value) {
        const item = createElement("div", "summary-item");
        item.appendChild(createElement("div", "summary-label", label));
        item.appendChild(createElement("div", "summary-value", value));
        parent.appendChild(item);
      }

      function createSection(title, note) {
        const section = createElement("section", "section");
        const header = createElement("div", "section-header");
        const titleElement = createElement("h2", "section-title", title);
        header.appendChild(titleElement);
        if (note) {
          header.appendChild(createElement("p", "section-note", note));
        }
        section.appendChild(header);
        return section;
      }

      function appendJSONSection(parent, title, note, data) {
        const section = createSection(title, note);
        const pre = createElement("pre", "json-block");
        pre.textContent = JSON.stringify(data, null, 2);
        section.appendChild(pre);
        parent.appendChild(section);
      }

      function cleanupLatestCapturePreview() {
        if (latestCapturePreviewItems.length === 0) return;
        for (const item of latestCapturePreviewItems) {
          if (item && item.url) {
            URL.revokeObjectURL(item.url);
          }
        }
        latestCapturePreviewItems = [];
        latestCapturePreviewIndex = 0;
      }

      function setLatestCapturePreviewState(status) {
        latestCapturePreviewStatus = status;
      }

      function normalizeSettings(candidate) {
        return {
          showPlayerOverlay: candidate && typeof candidate.showPlayerOverlay === "boolean"
            ? candidate.showPlayerOverlay
            : candidate && typeof candidate.showPluginScreen === "boolean"
              ? candidate.showPluginScreen
              : DEFAULT_SETTINGS.showPlayerOverlay,
        };
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          return normalizeSettings(raw ? JSON.parse(raw) : null);
        } catch (error) {
          return normalizeSettings(null);
        }
      }

      function applySettings(nextSettings, shouldPersist) {
        const normalized = normalizeSettings(nextSettings);
        settings = normalized;

        if (shouldPersist) {
          try {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(normalized));
          } catch (error) {}

          if (settingsChannel) {
            settingsChannel.postMessage(normalized);
          }
        }

        render();
      }

      function setupSettingsSync() {
        if (typeof BroadcastChannel === "function") {
          try {
            settingsChannel = new BroadcastChannel(SETTINGS_CHANNEL_NAME);
            settingsChannel.addEventListener("message", (event) => {
              applySettings(event.data, false);
            });
          } catch (error) {
            settingsChannel = null;
          }
        }

        window.addEventListener("storage", (event) => {
          if (event.key !== SETTINGS_KEY) return;

          try {
            applySettings(event.newValue ? JSON.parse(event.newValue) : null, false);
          } catch (error) {
            applySettings(null, false);
          }
        });
      }

      function normalizeGenre(genre) {
        if (!genre) return null;
        return {
          lv1: typeof genre.lv1 === "number" ? genre.lv1 : null,
          lv2: typeof genre.lv2 === "number" ? genre.lv2 : null,
          name: genre.name || null,
        };
      }

      function normalizeProgram(program) {
        if (!program) return null;
        return {
          name: program.name || null,
          description: program.description || null,
          startAt: typeof program.startAt === "number" ? program.startAt : null,
          endAt: typeof program.endAt === "number" ? program.endAt : null,
          duration: typeof program.duration === "number" ? program.duration : null,
          eventId: typeof program.eventId === "number" ? program.eventId : null,
          extended: Array.isArray(program.extended) ? program.extended.slice() : [],
          genres: Array.isArray(program.genres) ? program.genres.map(normalizeGenre) : [],
        };
      }

      function normalizeService(service) {
        if (!service) return null;
        return {
          name: service.name || null,
          serviceId: typeof service.serviceId === "number" ? service.serviceId : null,
          networkId: typeof service.networkId === "number" ? service.networkId : null,
          type: service.type ? {
            value: typeof service.type.value === "number" ? service.type.value : null,
            description: service.type.description || null,
          } : null,
          channel: service.channel ? {
            id: service.channel.id || null,
            type: service.channel.type || null,
          } : null,
        };
      }

      function normalizePlayable(playable) {
        if (!playable) return null;
        return {
          playerID: playable.playerID || null,
          id: playable.id || null,
          title: playable.title || null,
          subtitle: playable.subtitle || null,
          initialNetworkTime: typeof playable.initialNetworkTime === "number" ? playable.initialNetworkTime : null,
          isSeekable: Boolean(playable.isSeekable),
          length: typeof playable.length === "number" ? playable.length : null,
          program: normalizeProgram(playable.program),
          service: normalizeService(playable.service),
        };
      }

      function normalizeStatus(status) {
        if (!status) return null;
        return {
          playerID: status.playerID || null,
          playableID: status.playableID || null,
          isPlaying: Boolean(status.isPlaying),
          time: typeof status.time === "number" ? status.time : null,
          position: typeof status.position === "number" ? status.position : null,
          rate: typeof status.rate === "number" ? status.rate : null,
        };
      }

      function normalizeDisplayArea(area) {
        if (!area) {
          return {
            type: "unknown",
            playerID: null,
            width: window.innerWidth,
            height: window.innerHeight,
          };
        }

        return {
          type: area.type || "unknown",
          playerID: area.playerID || null,
          width: typeof area.width === "number" ? area.width : window.innerWidth,
          height: typeof area.height === "number" ? area.height : window.innerHeight,
        };
      }

      function normalizeCapture(capture) {
        if (!capture) return null;
        return {
          playerID: capture.playerID || null,
          captureID: capture.captureID || null,
          capturedAt: capture.capturedAt instanceof Date
            ? capture.capturedAt.toISOString()
            : capture.capturedAt || null,
          references: Array.isArray(capture.references) ? capture.references.map((reference) => ({
            playerID: reference.playerID || null,
            captureID: reference.captureID || null,
            variant: reference.variant || null,
            overlayPluginManifestIDs: Array.isArray(reference.overlayPluginManifestIDs)
              ? reference.overlayPluginManifestIDs.slice()
              : [],
          })) : [],
        };
      }

      function getDisplayArea() {
        return normalizeDisplayArea(bridge.getDisplayArea ? bridge.getDisplayArea() : null);
      }

      function getFocusedPlayerID() {
        return bridge.getFocusedPlayerID ? bridge.getFocusedPlayerID() : null;
      }

      function getPlayables() {
        return bridge.getPlayables ? bridge.getPlayables() : [];
      }

      function getStatuses() {
        return bridge.getPlayerStatuses ? bridge.getPlayerStatuses() : [];
      }

      function collectState() {
        const area = getDisplayArea();
        const focusedPlayerID = getFocusedPlayerID();
        const targetPlayerID = focusedPlayerID || area.playerID || null;
        const playable = targetPlayerID && bridge.getPlayable ? bridge.getPlayable(targetPlayerID) : null;
        const status = targetPlayerID && bridge.getPlayerStatus ? bridge.getPlayerStatus(targetPlayerID) : null;
        const clampedPreviewIndex = latestCapturePreviewItems.length > 0
          ? Math.min(latestCapturePreviewIndex, latestCapturePreviewItems.length - 1)
          : 0;

        return {
          area,
          focusedPlayerID,
          targetPlayerID,
          playable: normalizePlayable(playable),
          status: normalizeStatus(status),
          playables: getPlayables().map(normalizePlayable),
          statuses: getStatuses().map(normalizeStatus),
          latestCapture: normalizeCapture(latestCapturePayload),
          latestCapturePreview: {
            items: latestCapturePreviewItems.map((item) => ({
              url: item.url,
              variant: item.variant,
              sizeText: item.sizeText,
              overlayPluginManifestIDs: Array.isArray(item.overlayPluginManifestIDs)
                ? item.overlayPluginManifestIDs.slice()
                : [],
            })),
            status: latestCapturePreviewStatus,
            currentIndex: clampedPreviewIndex,
          },
        };
      }

      function buildFocusedSnapshot(state) {
        return {
          settings: { showPlayerOverlay: settings.showPlayerOverlay },
          focusedPlayerID: state.focusedPlayerID,
          targetPlayerID: state.targetPlayerID,
          displayArea: state.area,
          playable: state.playable,
          playerStatus: state.status,
          latestCapture: state.latestCapture,
          latestCapturePreview: {
            hasImage: state.latestCapturePreview.items.length > 0,
            status: state.latestCapturePreview.status,
            itemCount: state.latestCapturePreview.items.length,
            currentIndex: state.latestCapturePreview.currentIndex,
            items: state.latestCapturePreview.items.map((item) => ({
              variant: item.variant,
              sizeText: item.sizeText,
              overlayPluginManifestIDs: item.overlayPluginManifestIDs,
            })),
          },
        };
      }

      function buildGlobalSnapshot(state) {
        return {
          focusedPlayerID: state.focusedPlayerID,
          playables: state.playables,
          playerStatuses: state.statuses,
          latestCapture: state.latestCapture,
          latestCapturePreview: {
            hasImage: state.latestCapturePreview.items.length > 0,
            status: state.latestCapturePreview.status,
            itemCount: state.latestCapturePreview.items.length,
            currentIndex: state.latestCapturePreview.currentIndex,
            items: state.latestCapturePreview.items.map((item) => ({
              variant: item.variant,
              sizeText: item.sizeText,
              overlayPluginManifestIDs: item.overlayPluginManifestIDs,
            })),
          },
        };
      }

      function buildCaptureVariantLabel(capture) {
        if (!capture || !Array.isArray(capture.references) || capture.references.length === 0) return "-";
        return capture.references
          .map((reference) => reference && reference.variant ? reference.variant : null)
          .filter(Boolean)
          .join(", ") || "-";
      }

      function buildCaptureOverlayLabel(capture) {
        if (!capture || !Array.isArray(capture.references)) return "-";
        const overlayIDs = Array.from(new Set(capture.references.flatMap((reference) => (
          Array.isArray(reference && reference.overlayPluginManifestIDs)
            ? reference.overlayPluginManifestIDs
            : []
        ))));
        return overlayIDs.length > 0 ? overlayIDs.join(", ") : "-";
      }

      function buildProgramWindow(playable) {
        if (!playable || !playable.program) return "-";

        return `${formatTimestamp(playable.program.startAt)} - ${formatTimestamp(playable.program.endAt)}`;
      }

      function buildServiceLabel(playable) {
        if (!playable || !playable.service) return "-";

        const service = playable.service;
        return `${service.name || "-"} / SID ${service.serviceId} / NID ${service.networkId}`;
      }

      function renderCapturePreviewSection(state) {
        const section = createSection("最新キャプチャプレビュー", "onCaptureTaken で受けた最新 1 件だけを保持し、新しいイベント到着時に前回分を破棄します。");
        const summary = createElement("div", "summary-grid");
        const capture = state.latestCapture;
        const previewItems = state.latestCapturePreview.items;
        const activePreview = previewItems[state.latestCapturePreview.currentIndex] || null;

        appendSummaryItem(summary, "キャプチャID", capture && capture.captureID ? capture.captureID : "-");
        appendSummaryItem(summary, "プレイヤーID", capture && capture.playerID ? capture.playerID : "-");
        appendSummaryItem(summary, "撮影時刻", capture ? formatDateLike(capture.capturedAt) : "-");
        appendSummaryItem(summary, "受信 variants", buildCaptureVariantLabel(capture));
        appendSummaryItem(summary, "合成オーバーレイ", buildCaptureOverlayLabel(capture));
        appendSummaryItem(summary, "Blob 取得結果", state.latestCapturePreview.status || "-");
        appendSummaryItem(summary, "表示中 variant", activePreview && activePreview.variant ? activePreview.variant : "-");
        section.appendChild(summary);

        if (previewItems.length > 0) {
          if (previewItems.length > 1) {
            const header = createElement("div", "carousel-header");
            const meta = createElement("div", "carousel-meta");
            meta.appendChild(createElement("p", "carousel-title", activePreview && activePreview.variant ? activePreview.variant : "preview"));
            meta.appendChild(createElement(
              "p",
              "carousel-subtitle",
              `${state.latestCapturePreview.currentIndex + 1} / ${previewItems.length}${activePreview && activePreview.sizeText ? ` / ${activePreview.sizeText}` : ""}`
            ));

            const controls = createElement("div", "carousel-controls");
            const prevButton = createElement("button", "carousel-button", "前へ");
            prevButton.type = "button";
            prevButton.disabled = state.latestCapturePreview.currentIndex === 0;
            prevButton.addEventListener("click", () => {
              latestCapturePreviewIndex = Math.max(0, latestCapturePreviewIndex - 1);
              render();
            });

            const indicator = createElement("span", "carousel-indicator", `${state.latestCapturePreview.currentIndex + 1} / ${previewItems.length}`);

            const nextButton = createElement("button", "carousel-button", "次へ");
            nextButton.type = "button";
            nextButton.disabled = state.latestCapturePreview.currentIndex >= previewItems.length - 1;
            nextButton.addEventListener("click", () => {
              latestCapturePreviewIndex = Math.min(previewItems.length - 1, latestCapturePreviewIndex + 1);
              render();
            });

            controls.appendChild(prevButton);
            controls.appendChild(indicator);
            controls.appendChild(nextButton);

            header.appendChild(meta);
            header.appendChild(controls);
            section.appendChild(header);

            const dots = createElement("div", "carousel-dots");
            previewItems.forEach((item, index) => {
              const dot = createElement("button", `carousel-dot${index === state.latestCapturePreview.currentIndex ? " is-active" : ""}`);
              dot.type = "button";
              dot.setAttribute("aria-label", `${index + 1}枚目を表示`);
              dot.title = item.variant || `${index + 1}`;
              dot.addEventListener("click", () => {
                latestCapturePreviewIndex = index;
                render();
              });
              dots.appendChild(dot);
            });
            section.appendChild(dots);
          }

          const frame = createElement("div", "capture-preview-frame");
          const image = createElement("img", "capture-preview-image");
          image.src = activePreview.url;
          image.alt = "Latest capture preview";
          frame.appendChild(image);
          section.appendChild(frame);
        } else {
          section.appendChild(createElement(
            "div",
            "empty-state",
            capture ? state.latestCapturePreview.status || "Blob 取得待機中です。" : "キャプチャイベント待機中です。"
          ));
        }

        return section;
      }

      function renderPluginScreen(state) {
        const screen = createElement("main", "screen-scroll");

        const hero = createElement("section", "hero-card");
        const heroTop = createElement("div", "hero-top");
        const titleGroup = createElement("div");
        titleGroup.appendChild(createElement("p", "kicker", "Plugin Screen"));
        titleGroup.appendChild(createElement("h1", "hero-title", state.playable && state.playable.title ? state.playable.title : "フォーカス中メディアなし"));
        titleGroup.appendChild(createElement(
          "p",
          "hero-subtitle",
          state.playable && state.playable.subtitle
            ? state.playable.subtitle
            : "フォーカス中プレイヤーのメディア情報をそのまま展開しています。"
        ));

        const chips = createElement("div", "chip-row");
        chips.appendChild(createElement("div", `chip ${settings.showPlayerOverlay ? "is-on" : "is-off"}`, `PlayerOverlay: ${settings.showPlayerOverlay ? "ON" : "OFF"}`));
        chips.appendChild(createElement("div", "chip", `表示領域: ${toAreaLabel(state.area.type)}`));
        chips.appendChild(createElement("div", "chip", `フォーカス: ${shortID(state.focusedPlayerID)}`));

        heroTop.appendChild(titleGroup);
        heroTop.appendChild(chips);
        hero.appendChild(heroTop);

        const summary = createElement("div", "summary-grid");
        appendSummaryItem(summary, "フォーカスプレイヤーID", state.focusedPlayerID || "(none)");
        appendSummaryItem(summary, "参照プレイヤーID", state.targetPlayerID || "(none)");
        appendSummaryItem(summary, "コンテンツID", state.playable && state.playable.id ? state.playable.id : "-");
        appendSummaryItem(summary, "チャンネル", buildServiceLabel(state.playable));
        appendSummaryItem(summary, "放送時間", buildProgramWindow(state.playable));
        appendSummaryItem(summary, "長さ", state.playable ? formatDuration(state.playable.length) : "-");
        appendSummaryItem(summary, "基準時刻 (iNT)", state.playable ? formatTimestamp(state.playable.initialNetworkTime) : "-");
        appendSummaryItem(summary, "シーク可否", state.playable ? formatBoolean(state.playable.isSeekable) : "-");
        appendSummaryItem(summary, "再生中", state.status ? formatBoolean(state.status.isPlaying) : "-");
        appendSummaryItem(summary, "再生時刻", state.status ? formatPlaybackTime(state.status.time) : "-");
        appendSummaryItem(summary, "再生位置", state.status ? formatPosition(state.status.position) : "-");
        appendSummaryItem(summary, "再生速度", state.status && state.status.rate != null ? `${state.status.rate.toFixed(2)}x` : "-");
        appendSummaryItem(summary, "最新キャプチャID", state.latestCapture && state.latestCapture.captureID ? state.latestCapture.captureID : "-");
        appendSummaryItem(summary, "表示領域サイズ", `${Math.round(state.area.width)} x ${Math.round(state.area.height)}`);
        hero.appendChild(summary);
        screen.appendChild(hero);

        if (!state.targetPlayerID) {
          screen.appendChild(createElement("div", "empty-state", "フォーカス中のプレイヤーがないため、表示できるメディア情報はありません。プレイヤーをフォーカスするとここに反映されます。"));
        }

        appendJSONSection(screen, "フォーカス中メディアの取得結果", "Playable / PlayerStatus / DisplayArea / Capture をまとめて表示します。", buildFocusedSnapshot(state));
        appendJSONSection(screen, "現在参照できる全プレイヤー状態", "getPlayables() / getPlayerStatuses() の全件です。", buildGlobalSnapshot(state));
        screen.appendChild(renderCapturePreviewSection(state));

        return screen;
      }

      function renderPlayerOverlay(state) {
        const shell = createElement("div", "overlay-shell");
        const badge = createElement("div", "overlay-badge");
        const line = createElement("div", "overlay-line");
        line.appendChild(createElement("span", "overlay-dot"));
        line.appendChild(createElement("span", "overlay-label", "Kiririn Plugin"));
        badge.appendChild(line);

        const title = state.playable && state.playable.title
          ? state.playable.title
          : `focus ${shortID(state.focusedPlayerID)}`;
        badge.appendChild(createElement("div", "overlay-meta", `overlay / ${title}`));
        shell.appendChild(badge);
        return shell;
      }

      function renderPluginSettings() {
        const shell = createElement("div", "settings-shell");
        const panel = createElement("section", "settings-panel");

        panel.appendChild(createElement("h1", "settings-title", "PlayerOverlay 表示設定"));
        panel.appendChild(createElement("p", "settings-copy", "PlayerOverlay に小さな状態バッジを表示するかどうかを切り替えます。PluginScreen は常に表示され、同一プラグインの他の表示領域にも即時反映されます。"));

        const toggleCard = createElement("label", "toggle-card");
        const toggleCopy = createElement("div", "toggle-copy");
        toggleCopy.appendChild(createElement("div", "toggle-label", "PlayerOverlay を表示する"));
        toggleCopy.appendChild(createElement("div", "toggle-note", "OFF にしても PluginScreen は表示されたままです。"));

        const input = createElement("input", "toggle-input");
        input.type = "checkbox";
        input.checked = settings.showPlayerOverlay;
        input.addEventListener("change", () => {
          applySettings({ showPlayerOverlay: input.checked }, true);
        });

        toggleCard.appendChild(toggleCopy);
        toggleCard.appendChild(input);
        panel.appendChild(toggleCard);
        panel.appendChild(createElement("p", "status-line", `現在の値: ${settings.showPlayerOverlay ? "true" : "false"}`));

        shell.appendChild(panel);
        return shell;
      }

      function render() {
        if (!app) return;

        const previousScrollTop = app.querySelector(".screen-scroll")
          ? app.querySelector(".screen-scroll").scrollTop
          : 0;
        const state = collectState();

        document.body.dataset.areaType = state.area.type || "unknown";
        if (state.area.type === "pluginScreen") {
          const screen = renderPluginScreen(state);
          app.replaceChildren(screen);
          screen.scrollTop = previousScrollTop;
          return;
        }

        if (state.area.type === "pluginSettings") {
          app.replaceChildren(renderPluginSettings());
          return;
        }

        if (!settings.showPlayerOverlay) {
          app.replaceChildren();
          return;
        }

        app.replaceChildren(renderPlayerOverlay(state));
      }

      async function handleCaptureTaken(payload) {
        if (!payload) return;

        latestCapturePayload = payload;
        const references = Array.isArray(payload.references) ? payload.references : [];
        const requestToken = ++latestCaptureRequestToken;

        cleanupLatestCapturePreview();
        setLatestCapturePreviewState(references.length > 0 ? "Blob 取得中..." : "取得可能な参照なし");
        render();

        if (references.length === 0) {
          return;
        }

        if (!bridge.getCaptureBlob) {
          setLatestCapturePreviewState("Blob API unavailable");
          render();
          return;
        }

        try {
          const results = await Promise.all(references.map(async (reference) => {
            try {
              const blob = await bridge.getCaptureBlob(reference);
              return { reference, blob, error: null };
            } catch (error) {
              return { reference, blob: null, error };
            }
          }));

          if (requestToken !== latestCaptureRequestToken) {
            return;
          }

          const nextItems = [];
          const failures = [];

          for (const result of results) {
            if (!result.blob) {
              failures.push(result.error instanceof Error ? result.error.message : `${result.reference.variant || "unknown"} unavailable`);
              continue;
            }

            nextItems.push({
              url: URL.createObjectURL(result.blob),
              variant: result.reference.variant || null,
              sizeText: `${(result.blob.size / 1024).toFixed(1)} KiB`,
              overlayPluginManifestIDs: Array.isArray(result.reference.overlayPluginManifestIDs)
                ? result.reference.overlayPluginManifestIDs.slice()
                : [],
            });
          }

          if (requestToken !== latestCaptureRequestToken) {
            for (const item of nextItems) {
              URL.revokeObjectURL(item.url);
            }
            return;
          }

          latestCapturePreviewItems = nextItems;
          latestCapturePreviewIndex = 0;

          if (nextItems.length === 0) {
            setLatestCapturePreviewState(failures[0] || "Blob unavailable");
          } else if (failures.length === 0) {
            setLatestCapturePreviewState(
              nextItems.length === 1
                ? `${nextItems[0].variant || "image"} / ${nextItems[0].sizeText}`
                : `${nextItems.length} variants を読み込みました`
            );
          } else {
            setLatestCapturePreviewState(`${nextItems.length}/${references.length} variants を読み込みました`);
          }

          render();
        } catch (error) {
          if (requestToken !== latestCaptureRequestToken) {
            return;
          }

          setLatestCapturePreviewState(error instanceof Error ? error.message : String(error));
          render();
        }
      }

      function handlePlayerClosed(playerID) {
        if (!playerID) return;

        if (latestCapturePayload && latestCapturePayload.playerID === playerID) {
          latestCaptureRequestToken += 1;
          latestCapturePayload = null;
          cleanupLatestCapturePreview();
          setLatestCapturePreviewState("キャプチャ待機中");
        }

        render();
      }

      function bindBridgeListeners() {
        if (bridge.onDisplayAreaChange) {
          bridge.onDisplayAreaChange(() => render());
        }
        if (bridge.onPlayablesChange) {
          bridge.onPlayablesChange(() => render());
        }
        if (bridge.onPlayerStatusesChange) {
          bridge.onPlayerStatusesChange(() => render());
        }
        if (bridge.onFocusedPlayerIDChange) {
          bridge.onFocusedPlayerIDChange(() => render());
        }
        if (bridge.onPlayerClosed) {
          bridge.onPlayerClosed((playerID) => handlePlayerClosed(playerID));
        }
        if (bridge.onCaptureTaken) {
          bridge.onCaptureTaken((payload) => handleCaptureTaken(payload));
        }
      }

      setupSettingsSync();
      bindBridgeListeners();
      render();

      window.addEventListener("resize", () => render());
      window.addEventListener("beforeunload", () => {
        latestCaptureRequestToken += 1;
        cleanupLatestCapturePreview();
        if (settingsChannel) {
          settingsChannel.close();
        }
      });
    })();
  </script>
</body>
</html>
